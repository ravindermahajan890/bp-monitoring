version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bp_monitor_db
    environment:
      POSTGRES_USER: bp_user
      POSTGRES_PASSWORD: bp_password
      POSTGRES_DB: bp_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

